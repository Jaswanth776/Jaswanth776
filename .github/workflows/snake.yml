# ═══════════════════════════════════════════════════════════════
#  GITHUB CONTRIBUTION SNAKE ANIMATION
#  Generates an animated SVG snake that eats your contributions
# ═══════════════════════════════════════════════════════════════

name: Contribution Snake Animation

on:
  # Run every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Run on every push to main
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout repository ───────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Generate snake animation ──────────────────────────
      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3
        with:
          # Your GitHub username
          github_user_name: ${{ github.repository_owner }}
          # Output files
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00D2FF
            dist/ocean.gif?color_snake=#00D2FF&color_dots=#0B192C,#0052CC,#0077B6,#00D2FF,#48CAE4

      # ── Deploy to output branch ───────────────────────────
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
